<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="rc"><rect width="512" height="512" rx="112"/></clipPath>
    <linearGradient id="bg" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#109fb4"/>
      <stop offset="0.5" stop-color="#1f4cb6"/>
      <stop offset="1" stop-color="#331a66"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#rc)">
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- frosted glass circle (behind) -->
    <circle cx="205" cy="300" r="131" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.32" stroke-width="2.5"/>

    <!-- frosted glass panel -->
    <rect x="164" y="110" width="240" height="240" rx="46" fill="#ffffff" fill-opacity="0.16" stroke="#ffffff" stroke-opacity="0.45" stroke-width="2.5"/>

    <!-- glass "A" -->
    <g stroke="#f2f9ff" stroke-linecap="round" fill="none" stroke-width="26">
      <line x1="256" y1="177" x2="205" y2="328"/>
      <line x1="256" y1="177" x2="307" y2="328"/>
      <line x1="228" y1="283" x2="284" y2="283" stroke-width="20"/>
    </g>

    <!-- top bevel sheen -->
    <rect width="512" height="9" fill="#ffffff" opacity="0.22"/>
  </g>
</svg>
