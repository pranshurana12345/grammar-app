<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="rc"><rect width="512" height="512" rx="112"/></clipPath>
    <linearGradient id="bg" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#5f54c8"/>
      <stop offset="0.5" stop-color="#483ea8"/>
      <stop offset="1" stop-color="#2c256c"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#rc)">
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- frosted glass circle (bottom-left) -->
    <circle cx="136" cy="376" r="64" fill="#ffffff" fill-opacity="0.14" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2.5"/>
    <!-- frosted glass square (top-right) -->
    <rect x="313" y="113" width="128" height="128" rx="34" fill="#ffffff" fill-opacity="0.16" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2.5"/>

    <!-- bold "G" -->
    <text x="256" y="262" text-anchor="middle" dominant-baseline="central"
      font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-weight="800" font-size="250" fill="#f4f9ff">G</text>

    <!-- top bevel sheen -->
    <rect width="512" height="9" fill="#ffffff" opacity="0.2"/>
  </g>
</svg>
