<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="rc"><rect width="512" height="512" rx="112"/></clipPath>
    <filter id="blur" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="62"/></filter>
    <filter id="blur2" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="34"/></filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2a6b"/>
      <stop offset="1" stop-color="#0b1234"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#rc)">
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- iridescent colour blobs glowing through the glass -->
    <g filter="url(#blur)" style="mix-blend-mode:screen">
      <circle cx="143" cy="154" r="155" fill="#3b82f6"/>
      <circle cx="389" cy="123" r="140" fill="#8b5cf6"/>
      <circle cx="338" cy="410" r="145" fill="#22d3ee"/>
      <circle cx="133" cy="420" r="115" fill="#f472b6"/>
    </g>

    <!-- glossy reflection streak -->
    <g filter="url(#blur2)" style="mix-blend-mode:screen">
      <polygon points="-40,150 150,-40 250,-40 60,150" fill="#ffffff" opacity="0.55"/>
      <polygon points="-40,250 250,-40 300,-40 10,250" fill="#ffffff" opacity="0.3"/>
    </g>

    <!-- top bevel light -->
    <rect width="512" height="10" fill="#ffffff" opacity="0.25"/>
  </g>
</svg>
